name: ShopSmart CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  checks: write

env:
  AWS_REGION: us-east-1

jobs:
  test:
    name: Test and Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # --- Server Tests ---
      - name: Install Server Dependencies
        working-directory: ./server
        run: npm install

      - name: Run Server Tests
        working-directory: ./server
        run: npm test -- --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name: Upload Server Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-test-report
          path: server/junit.xml

      - name: Server Test Report Annotation
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Server Tests
          path: server/junit.xml
          reporter: jest-junit

      # --- Client Tests ---
      - name: Install Client Dependencies
        working-directory: ./client
        run: npm install

      - name: Run Client Tests
        working-directory: ./client
        run: npm test -- --run --reporter=default --reporter=junit --outputFile=junit.xml

      - name: Upload Client Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-test-report
          path: client/junit.xml

      - name: Client Test Report Annotation
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Client Tests
          path: client/junit.xml
          reporter: java-junit

  terraform:
    name: Provision Infrastructure
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Optional, for academy accounts
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan
        env:
          TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

      - name: Export Terraform Outputs
        id: tf_outputs
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "frontend_ecr_url=$(terraform output -raw frontend_ecr_url)" >> $GITHUB_OUTPUT
          echo "cluster_name=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "service_name=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT
          echo "frontend_service_name=$(terraform output -raw frontend_service_name)" >> $GITHUB_OUTPUT
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT
    outputs:
      ecr_url: ${{ steps.tf_outputs.outputs.ecr_url }}
      frontend_ecr_url: ${{ steps.tf_outputs.outputs.frontend_ecr_url }}
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}
      service_name: ${{ steps.tf_outputs.outputs.service_name }}
      frontend_service_name: ${{ steps.tf_outputs.outputs.frontend_service_name }}
      alb_dns_name: ${{ steps.tf_outputs.outputs.alb_dns_name }}

  build-and-push:
    name: Build & Push to ECR
    needs: terraform
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push images to Amazon ECR
        env:
          ECR_URL: ${{ needs.terraform.outputs.ecr_url }}
          FRONTEND_ECR_URL: ${{ needs.terraform.outputs.frontend_ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build Backend
          cd server
          docker build -t $ECR_URL:$IMAGE_TAG .
          docker tag $ECR_URL:$IMAGE_TAG $ECR_URL:latest
          docker push $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:latest
          cd ..
          
          # Build Frontend
          cd client
          docker build -t $FRONTEND_ECR_URL:$IMAGE_TAG .
          docker tag $FRONTEND_ECR_URL:$IMAGE_TAG $FRONTEND_ECR_URL:latest
          docker push $FRONTEND_ECR_URL:$IMAGE_TAG
          docker push $FRONTEND_ECR_URL:latest

  deploy:
    name: Deploy to ECS Fargate
    needs: [terraform, build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force New ECS Deployments
        run: |
          # Update Backend
          aws ecs update-service \
            --cluster ${{ needs.terraform.outputs.cluster_name }} \
            --service ${{ needs.terraform.outputs.service_name }} \
            --force-new-deployment
          
          # Update Frontend
          aws ecs update-service \
            --cluster ${{ needs.terraform.outputs.cluster_name }} \
            --service ${{ needs.terraform.outputs.frontend_service_name }} \
            --force-new-deployment

      - name: Wait for Services Stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ needs.terraform.outputs.cluster_name }} \
            --services ${{ needs.terraform.outputs.service_name }} ${{ needs.terraform.outputs.frontend_service_name }}

      - name: Verify Service Connectivity
        run: |
          ALB_URL=${{ needs.terraform.outputs.alb_dns_name }}
          
          echo "Verifying Backend at http://$ALB_URL/api/health"
          for i in {1..10}; do
            if curl -s -f "http://$ALB_URL/api/health"; then
              echo "Backend is UP!"
              break
            fi
            echo "Waiting for backend... ($i/10)"
            sleep 15
            if [ $i -eq 10 ]; then echo "Backend failed"; exit 1; fi
          done

          echo "Verifying Frontend at http://$ALB_URL/"
          for i in {1..10}; do
            if curl -s -f "http://$ALB_URL/"; then
              echo "Frontend is UP!"
              exit 0
            fi
            echo "Waiting for frontend... ($i/10)"
            sleep 15
          done
          echo "Frontend failed to respond at http://$ALB_URL/"
          exit 1
