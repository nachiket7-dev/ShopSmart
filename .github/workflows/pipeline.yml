name: ShopSmart CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  checks: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: shopsmart-backend

jobs:
  test:
    name: Test and Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # --- Server Tests ---
      - name: Install Server Dependencies
        working-directory: ./server
        run: npm install

      - name: Run Server Tests
        working-directory: ./server
        run: npm test -- --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name: Upload Server Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-test-report
          path: server/junit.xml

      - name: Server Test Report Annotation
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Server Tests
          path: server/junit.xml
          reporter: jest-junit

      # --- Client Tests ---
      - name: Install Client Dependencies
        working-directory: ./client
        run: npm install

      - name: Run Client Tests
        working-directory: ./client
        run: npm test -- --run --reporter=default --reporter=junit --outputFile=junit.xml

      - name: Upload Client Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-test-report
          path: client/junit.xml

      - name: Client Test Report Annotation
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Client Tests
          path: client/junit.xml
          reporter: java-junit

  terraform:
    name: Provision Infrastructure
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Optional, for academy accounts
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Export Terraform Outputs
        id: tf_outputs
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "cluster_name=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "service_name=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT
    outputs:
      ecr_url: ${{ steps.tf_outputs.outputs.ecr_url }}
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}
      service_name: ${{ steps.tf_outputs.outputs.service_name }}

  build-and-push:
    name: Build & Push to ECR
    needs: terraform
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./server
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to ECS Fargate
    needs: [terraform, build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force New ECS Deployment
        run: |
          aws ecs update-service \
            --cluster ${{ needs.terraform.outputs.cluster_name }} \
            --service ${{ needs.terraform.outputs.service_name }} \
            --force-new-deployment

      - name: Wait for Service Stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ needs.terraform.outputs.cluster_name }} \
            --services ${{ needs.terraform.outputs.service_name }}
